name: Trigger auto deployment for serviceplanner

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/serviceplanner-AutoDeployTrigger-00335218-b430-4922-8ca2-addec5b57b6f.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.SERVICEPLANNER_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.SERVICEPLANNER_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.SERVICEPLANNER_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: docker.io
          registryUsername: ${{ secrets.SERVICEPLANNER_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.SERVICEPLANNER_REGISTRY_PASSWORD }}
          containerAppName: serviceplanner
          resourceGroup: ServicePlanner-RG
          imageToBuild: highphilosopher/serviceplanner:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


